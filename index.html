<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ Happy 4th Anniversary ❤️</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg,#ffe4ec,#ffc9de);
    font-family: 'Poppins', sans-serif;
    color: #444;
    overflow: hidden;
  }
  .box {
    background:white;
    border-radius:20px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,0.15);
    width:90%;
    max-width:400px;
    padding:25px;
    transition:opacity .5s ease,transform .5s ease;
  }
  h1,h2{color:#e75480;}
  button,.option {
    display:block;
    margin:10px auto;
    padding:10px 20px;
    background:#e75480;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
  }
  #pin-section input {
    font-size:18px;
    text-align:center;
    letter-spacing:4px;
    padding:8px;
    border-radius:8px;
    border:1px solid #ccc;
    width:80px;
  }
  #message{margin-top:10px;color:#e75480;}
  .fade-out{opacity:0;transform:translateY(-20px);}
  .fade-in{opacity:1;transform:translateY(0);}
</style>
</head>
<body>
<audio id="wrong-sound" src="huh-cat.mp3" preload="auto"></audio>
<audio id="celebrate-sound" src="correct.mp3" preload="auto"></audio>
<audio id="bg-music" src="mario.mp3" preload="auto" loop></audio>
<div class="box fade-in" id="content">
  <h1>Happy Birthday<br>🎉 and 🎉<br>Happy 4th Anniversary</h1>
  <p>I hope you love your gift. The bag won’t just hold your belongings — it’ll carry our memories and follow us into our future together.</p>
  <h3>Now you love me huh? 🤭</h3>
  <div id="love-buttons">
    <button id="yesBtn">Yes</button>
    <button id="noBtn">ㄟ( ▔, ▔ )ㄏ</button>
  </div>
</div>

<script>
const content=document.getElementById('content');

function animateTransition(cb){
  content.classList.add("fade-out");
  setTimeout(()=>{
    cb();
    content.classList.remove("fade-out");
    content.classList.add("fade-in");
  },400);
}

// playful yes/no page
const noBtn=document.getElementById('noBtn');
const yesBtn=document.getElementById('yesBtn');

noBtn.addEventListener('click',()=>moveNo());
function moveNo(){
  const x=Math.random()*200-100;
  const y=Math.random()*200-100;
  noBtn.style.transform=`translate(${x}px,${y}px)`;
}

yesBtn.addEventListener('click',()=>{
  const bg = document.getElementById("bg-music");
  const sound = document.getElementById("celebrate-sound");

  // Start the Kahoot-style background music
  bg.volume = 0.25;
  bg.play();

  // Play the short celebration sound once
  sound.currentTime = 0;
  sound.volume = 0.4;
  sound.play();

  animateTransition(startSecondPage);
});



function startSecondPage(){
  content.innerHTML=`
  <img src="Avatar.jfif" style="width:60%; border-radius:15px; margin-bottom:15px;">
    <h2>Shall we begin this puzzle for your next surprise? 🧩✨</h2>
    <button onclick="startQuiz()">Let the adventure start!</button>
  `;
}

function startQuiz(){
  const sound = document.getElementById("celebrate-sound");
  sound.currentTime = 0;
  sound.volume = 0.4;
  sound.play();
  animateTransition(()=>loadQuiz());
}


// QUIZ SECTION
function loadQuiz(){
  content.innerHTML=`
    <h1>༼ つ ◕_◕ ༽つ 4th Anniversary Quiz</h1>
    <div id="quiz"></div>
    <div id="pin-section" style="display:none;">
      <h2>Enter the 4-digit PIN 💌</h2>
      <input type="password" maxlength="4" id="pin-input" placeholder="----"><br><br>
      <button onclick="checkPin()">Unlock</button>
      <p id="message"></p>
    </div>
  `;
  initQuiz();
}

const quizData=[
  {
    question:"When we first met in person?",
    img: "Q1.jpg",
    options:["2/14/2021","2/14/2022","03/02/2022","I don't know"],
    correct:1,number:2
  },
  {
    question:"Where did we travel together for the first time outside California?",
    img: "Q2.png",
    options:["Nevada","Florida","Utah","None of the above"],
    correct:2,number:1
  },
  {
    question:"The first thing I ever gave you as a gift?",
    img: "Q3.jpg",
    options:["Egg Custard","Baymax","Angry Cat","LOL Skin"],
    correct:3,number:2
  },
  {
    question:"Where did we take our first photo together?",
    img: "Q4.jpg",
    options:["Lantern festival","Fremont Shack of potato","Computer History Museum","Your home"],
    correct:0,number:2
  }
];

let current=0;
let code=[];
let quiz,pinSection;
function initQuiz(){
  quiz=document.getElementById('quiz');
  pinSection=document.getElementById('pin-section');
  showQuestion();
}

function showQuestion(){
  const q=quizData[current];
  quiz.innerHTML=`
    <img src="${q.img}" style="width:50%; border-radius:15px; margin-bottom:15px;">
    <h2>${q.question}</h2>
    ${q.options.map((opt,i)=>`<button class="option" onclick="checkAnswer(${i})">${opt}</button>`).join('')}
  `;
}
function showMessage(text) {
  const popup = document.getElementById("popup");
  popup.textContent = text;
  popup.style.display = "block";
  setTimeout(() => {
    popup.style.display = "none";
  }, 1500);
}

function checkAnswer(i){
  const q = quizData[current];
  const bg = document.getElementById("bg-music");
  const sound = document.getElementById("celebrate-sound");
  const wrong = document.getElementById("wrong-sound");

  if(i === q.correct){
    // ✅ correct: play celebration sound
    sound.currentTime = 0;
    sound.volume = 0.4;
    sound.play();

    showMessage("✅ Correct! Your number is " + q.number);
    code.push(q.number);
    current++;

    if(current < quizData.length){
      animateTransition(showQuestion);
    } else {
      animateTransition(()=>{
        quiz.style.display = "none";
        pinSection.style.display = "block";
      });
    }

  } else {
    // ❌ wrong: play huh? sound from 0.4s → 2s
    wrong.pause();                 // reset if playing
    wrong.currentTime = 1;       // start at half‑second mark
    wrong.volume = 0.4;
    wrong.play();

    setTimeout(()=>{
      wrong.pause();
      wrong.currentTime = 0;       // reset for next time
    }, 1000); // plays for 1.5 seconds (0.4s–2s)

    showMessage("😤 Huh!? 😤");
  }
}


function checkPin(){
  const input = document.getElementById('pin-input').value;
  const msg = document.getElementById('message');
  const bg = document.getElementById('bg-music');
  const sound = document.getElementById('celebrate-sound');

  if(input === code.join('')){
    // Stop background music smoothly
    if (bg) {
      bg.pause();
      bg.currentTime = 0;
    }

    // Play the same celebration sound
    sound.currentTime = 0;
    sound.volume = 0.4;
    sound.play();

    // Show success and redirect after short delay
    msg.textContent = "🎉 Correct PIN! Opening surprise... 🎉";
    setTimeout(()=>{
      window.location.href = "[tiktok.com](https://www.tiktok.com/@ddv0888/video/7624745908177014047)";
    },1500);
  } else {
    msg.textContent = "❌ Incorrect. Try again!";
  }
}


</script>

<div id="popup" style="
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  padding: 15px 25px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.2);
  font-size: 18px;
  color: #e75480;
  display: none;
  z-index: 9999;
  text-align:center;
">
</div>

</body>
</html>
